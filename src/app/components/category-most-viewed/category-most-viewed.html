<section class="bg-white p-6 rounded-3xl shadow-sm border border-gray-100">
  <div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-3">
    <h3 class="font-extrabold text-sm text-gray-800 uppercase tracking-wider flex items-center gap-1.5">
      <span class="w-1.5 h-4 bg-[#009639] rounded"></span>
      Los más vistos de la categoría
    </h3>
    <div class="flex gap-1.5">
      <button (click)="slidePrev()" class="w-7 h-7 rounded-full border border-gray-200 hover:bg-gray-50 flex items-center justify-center text-gray-500 hover:text-gray-700 transition shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button (click)="slideNext()" class="w-7 h-7 rounded-full border border-gray-200 hover:bg-gray-50 flex items-center justify-center text-gray-500 hover:text-gray-700 transition shadow-sm">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>
  </div>

  <div class="overflow-hidden relative">
    <div class="flex gap-4 transition-transform duration-500" [style.transform]="'translateX(-' + (slideIndex() * 100) + '%)'">
      @for (prod of featuredProducts; track prod.id) {
        <div class="w-full sm:w-1/2 md:w-1/3 shrink-0">
          <app-product-card [product]="prod"></app-product-card>
        </div>
      }
    </div>
  </div>

  <div class="flex justify-center gap-1.5 mt-4">
    <span class="w-2 h-2 rounded-full bg-[#009639] transition"></span>
    <span class="w-2 h-2 rounded-full bg-gray-200 transition"></span>
    <span class="w-2 h-2 rounded-full bg-gray-200 transition"></span>
  </div>
</section>
